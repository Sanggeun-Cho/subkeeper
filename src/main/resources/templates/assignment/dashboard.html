<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2359</title>
    <link rel="icon" href="/images/icon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        /* 스크롤바 디자인: 얇고 공간을 적게 차지하도록 수정 */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* 모달 애니메이션 */
        .modal-show { display: flex !important; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

<body class="flex h-screen overflow-hidden relative">

<div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden"></div>

<aside id="sidebar" class="w-64 bg-white border-r shadow-sm flex flex-col absolute inset-y-0 left-0 transform -translate-x-full z-30 sidebar-transition">
    <div class="p-4 flex justify-between items-center border-b shrink-0">
        <h2 class="text-lg font-bold text-gray-800">학기 목록</h2>
        <button onclick="toggleSidebar()" class="text-gray-500 hover:text-gray-800 text-xl font-bold">✖</button>
    </div>
    <div class="p-3 flex-1 overflow-y-auto">

    </div>

</aside>

<main class="flex-1 flex flex-col h-screen overflow-hidden w-full relative">
    <header class="bg-white shadow-sm h-14 md:h-16 flex items-center justify-between px-4 md:px-6 z-10 w-full shrink-0 relative">

            <button onclick="toggleSidebar()" class="text-gray-600 hover:text-gray-900 text-2xl focus:outline-none">☰</button>
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span class="text-lg font-bold text-gray-800 hidden sm:block">Subkeeper</span>
            </div>
        </div>

        <div id="header-semester-title" class="hidden absolute left-1/2 transform -translate-x-1/2 font-bold text-gray-800 text-base md:text-lg truncate w-1/3 text-center">
            학기를 불러오는 중...

        <div class="flex items-center justify-end space-x-3 w-1/3">

            <button onclick="logout()" class="text-xs md:text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 px-3 rounded-lg transition shrink-0">로그아웃</button>
        </div>
    </header>

    <div class="flex-1 overflow-hidden p-4 md:p-6 flex flex-col">

        <div id="empty-semester-state" class="hidden flex-1 flex-col items-center justify-center text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-20 h-20 text-blue-200 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-2">등록된 학기가 없습니다</h2>
            <p class="text-gray-500 mb-6 text-sm max-w-md">새로운 학기를 추가하고 과제들을 체계적으로 관리해보세요.</p>
            <button onclick="openSemesterModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl hover:bg-blue-700 transition shadow-md font-bold text-base hover:scale-105 transform">
                + 새 학기 시작하기
            </button>
        </div>

        <section class="mb-4 shrink-0 hidden" id="subject-section">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-lg font-semibold text-gray-800">과목</h2>
                <button onclick="openSubjectModal()" class="text-xs bg-blue-100 text-blue-700 py-1 px-2.5 rounded-md hover:bg-blue-200 font-medium">+ 과목 추가</button>
            </div>
            <div id="subject-container" class="flex gap-3 overflow-x-auto pb-1.5"></div>
        </section>

        <div class="hidden flex-1 flex flex-col overflow-hidden" id="assignment-section">
            <div class="bg-white border border-gray-200 p-2.5 md:p-3 rounded-lg shadow-sm mb-4 shrink-0 flex flex-col sm:flex-row items-center justify-between gap-3">
                <div class="flex items-center space-x-2 w-full sm:w-auto">
                    <label class="text-xs font-bold text-gray-700 shrink-0">과목 필터</label>
                    <select id="filter-subject" onchange="fetchFilteredAssignments()" class="w-full sm:w-auto border-gray-300 border py-1 px-2 rounded-md text-xs focus:ring-blue-500">
                        <option value="">전체 과목</option>
                    </select>
                </div>
                <div class="flex items-center space-x-3 w-full sm:w-auto overflow-x-auto pb-1 sm:pb-0">
                    <label class="text-xs font-bold text-gray-700 shrink-0">카테고리</label>
                    <label class="flex items-center space-x-1 text-xs cursor-pointer shrink-0">
                        <input type="checkbox" value="ASSIGNMENT" class="filter-category w-3.5 h-3.5 text-blue-600 rounded" onchange="fetchFilteredAssignments()"> <span class="text-gray-700">과제</span>
                    </label>
                    <label class="flex items-center space-x-1 text-xs cursor-pointer shrink-0">
                        <input type="checkbox" value="LECTURE" class="filter-category w-3.5 h-3.5 text-blue-600 rounded" onchange="fetchFilteredAssignments()"> <span class="text-gray-700">강의</span>
                    </label>
                    <label class="flex items-center space-x-1 text-xs cursor-pointer shrink-0">
                        <input type="checkbox" value="TODO" class="filter-category w-3.5 h-3.5 text-blue-600 rounded" onchange="fetchFilteredAssignments()"> <span class="text-gray-700">할 일</span>
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 flex-1 min-h-0">

                <section class="flex flex-col min-h-0">
                    <div class="flex items-center justify-between mb-2 shrink-0">
                        <h2 class="text-base font-semibold text-gray-800 flex items-center">
                            <span class="w-2.5 h-2.5 rounded-full bg-blue-500 mr-2"></span>진행 중인 과제
                        </h2>
                        <button onclick="openAssignmentModal()" class="text-xs bg-blue-600 text-white py-1 px-2.5 rounded-md hover:bg-blue-700 font-medium">+ 과제 추가</button>
                    </div>
                    <div id="incomplete-assignments" class="space-y-3 flex-1 overflow-y-auto pr-1 pb-2 min-h-0"></div>
                </section>

                <section class="flex flex-col min-h-0">
                    <h2 class="text-base font-semibold text-gray-800 mb-2 shrink-0 flex items-center">
                        <span class="w-2.5 h-2.5 rounded-full bg-gray-400 mr-2"></span>완료된 과제
                    </h2>
                    <div id="completed-assignments" class="space-y-3 flex-1 overflow-y-auto pr-1 pb-2 min-h-0"></div>
                </section>

            </div>
        </div>
    </div>

    <button onclick="toggleCalendar()" class="absolute bottom-20 md:bottom-24 right-6 w-12 h-12 md:w-14 md:h-14 bg-blue-600 text-white rounded-full shadow-xl flex items-center justify-center hover:bg-blue-700 transition transform hover:scale-105 z-20 text-xl md:text-2xl">
        📅
    </button>

    <button onclick="openPiP()" class="absolute bottom-6 right-6 w-12 h-12 md:w-14 md:h-14 bg-gray-800 text-white rounded-full shadow-xl flex items-center justify-center hover:bg-gray-700 transition transform hover:scale-105 z-20 text-xl md:text-2xl" title="미니 창으로 띄우기">
        📌
    </button>
</main>

<div id="calendar-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 justify-center items-center p-4 sm:p-8">
    <div class="bg-white rounded-xl w-full h-full max-w-6xl shadow-2xl flex flex-col relative overflow-hidden">
        <div class="p-3 border-b flex justify-between items-center bg-gray-50 shrink-0">
            <h2 class="text-xl font-bold text-gray-800 flex items-center">📅 일정 캘린더</h2>
            <button onclick="toggleCalendar()" class="text-gray-500 hover:text-gray-800 text-3xl font-bold leading-none">&times;</button>
        </div>
        <div class="p-3 flex-1 overflow-hidden">
            <div id='calendar' class="h-full"></div>
        </div>
    </div>
</div>

<div id="assignment-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 justify-center items-center">
    <div class="bg-white p-5 rounded-xl w-80 md:w-96 shadow-xl">
        <h3 id="modal-title" class="text-lg font-bold mb-4">과제 추가</h3>
        <input type="hidden" id="modal-id">
        <div class="mb-3">
            <label class="block text-xs font-medium text-gray-700 mb-1">과제명</label>
            <input type="text" id="modal-name" class="w-full border p-2 rounded text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="과제명 입력">
        </div>
        <div class="mb-3">
            <label class="block text-xs font-medium text-gray-700 mb-1">마감일 (YYYY-MM-DD)</label>
            <input type="date" id="modal-date" class="w-full border p-2 rounded text-sm focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div class="mb-3">
            <label class="block text-xs font-medium text-gray-700 mb-1">카테고리</label>
            <select id="modal-category" class="w-full border p-2 rounded text-sm focus:ring-blue-500 focus:border-blue-500">
                <option value="ASSIGNMENT">과제</option>
                <option value="LECTURE">강의</option>
                <option value="TODO">할 일</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="block text-xs font-medium text-gray-700 mb-1">담당 과목</label>
            <select id="modal-subject" class="w-full border p-2 rounded text-sm focus:ring-blue-500 focus:border-blue-500"></select>
        </div>
        <div class="mb-4 flex items-center hidden" id="modal-complete-wrapper">
            <input type="checkbox" id="modal-complete" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded">
            <label class="ml-2 text-sm font-medium text-gray-700">완료 여부</label>
        </div>
        <div class="flex justify-end space-x-2">
            <button onclick="closeAssignmentModal()" class="px-3 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded text-sm font-medium">취소</button>
            <button onclick="saveAssignment()" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">저장</button>
        </div>
    </div>
</div>

<div id="semester-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 justify-center items-center">
    <div class="bg-white p-5 rounded-xl w-72 md:w-80 shadow-xl">
        <h3 id="semester-modal-title" class="text-lg font-bold mb-4">새 학기 생성</h3>
        <input type="hidden" id="semester-modal-id">
        <div class="mb-4">
            <label class="block text-xs font-medium text-gray-700 mb-1">학기명</label>
            <input type="text" id="semester-modal-name" class="w-full border p-2 rounded text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="예: 2026년 1학기">
        </div>
        <div class="flex justify-end space-x-2">
            <button onclick="closeSemesterModal()" class="px-3 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded text-sm font-medium">취소</button>
            <button onclick="saveSemester()" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">저장</button>
        </div>
    </div>
</div>

<div id="subject-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 justify-center items-center">
    <div class="bg-white p-5 rounded-xl w-72 md:w-80 shadow-xl">
        <h3 id="subject-modal-title" class="text-lg font-bold mb-4">새 과목 추가</h3>
        <input type="hidden" id="subject-modal-id">
        <div class="mb-4">
            <label class="block text-xs font-medium text-gray-700 mb-1">과목명</label>
            <input type="text" id="subject-modal-name" class="w-full border p-2 rounded text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="과목명 입력">
        </div>
        <div class="flex justify-end space-x-2">
            <button onclick="closeSubjectModal()" class="px-3 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded text-sm font-medium">취소</button>
            <button onclick="saveSubject()" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">저장</button>
        </div>
    </div>
</div>

<script>
    let state = {
        semesters: [],
        subjects: [],
        assignments: [],
        currentSemesterId: null
    };

    function authAjax(options) {
        return new Promise(async (resolve, reject) => {
            try {
                // 1. 기존 요청 시도
                const result = await $.ajax({
                    ...options,
                    beforeSend: function(xhr) {
                        const token = localStorage.getItem("accessToken");
                        if (token) xhr.setRequestHeader("Authorization", token);
                    }
                });
                resolve(result);
            } catch (xhr) {
                // 2. 401 에러(액세스 토큰 만료) 감지
                if (xhr.status === 401) {
                    const refreshToken = localStorage.getItem("refreshToken");
                    if (!refreshToken) {
                        alert("세션이 만료되었습니다. 다시 로그인해주세요.");
                        logout();
                        return reject(xhr);
                    }

                    // 3. login.html과 동일한 방식으로 새로운 액세스 토큰 요청
                    $.ajax({
                        url: "/api/auth",
                        method: "POST",
                        beforeSend: function(refreshXhr) {
                            refreshXhr.setRequestHeader("RefreshToken", refreshToken);
                        },
                        contentType: 'application/json; charset=utf-8',
                        success: async (data, status, refreshXhr) => {
                            // 4. 새 토큰 발급 성공 시 스토리지 업데이트
                            const newAccessToken = refreshXhr.getResponseHeader("Authorization");
                            if (newAccessToken) {
                                localStorage.setItem("accessToken", newAccessToken);

                                // 5. 실패했던 원래 API 요청을 새 토큰으로 재시도
                                try {
                                    const retryResult = await $.ajax({
                                        ...options,
                                        beforeSend: function(retryXhr) {
                                            retryXhr.setRequestHeader("Authorization", newAccessToken);
                                        }
                                    });
                                    resolve(retryResult); // 최종 성공 데이터 반환
                                } catch (retryError) {
                                    reject(retryError);
                                }
                            } else {
                                alert("토큰 갱신에 실패했습니다. 다시 로그인해주세요.");
                                logout();
                                reject(xhr);
                            }
                        },
                        error: () => {
                            // 리프레시 토큰마저 만료된 경우
                            alert("로그인 세션이 완전히 만료되었습니다. 다시 로그인해주세요.");
                            logout();
                            reject(xhr);
                        }
                    });
                } else if (xhr.status === 403) {
                    alert("접근 권한이 없습니다.");
                    logout();
                    reject(xhr);
                } else {
                    console.error("API Error:", xhr);
                    reject(xhr);
                }
            }
        });
    }

    $(document).ready(async function() {
        const token = localStorage.getItem("accessToken");
        if(!token) return logout();
        initCalendar();
        setupEnterKeyListeners();
        await fetchUserInfo();
        await loadInitialData();
    });

    function setupEnterKeyListeners() {
        $('#semester-modal input').on('keydown', function(e) {
            if (e.key === 'Enter') saveSemester();
        });
        $('#subject-modal input').on('keydown', function(e) {
            if (e.key === 'Enter') saveSubject();
        });
        $('#assignment-modal input, #assignment-modal select').on('keydown', function(e) {
            if (e.key === 'Enter') saveAssignment();
        });
    }

    function getDdayTag(dueDateStr, isCompleted) {
        if (!dueDateStr) return '';
        if (isCompleted) {
            return '<span class="text-[10px] font-bold bg-gray-300 text-gray-700 px-1.5 py-0.5 rounded">완료</span>';
        }

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const due = new Date(dueDateStr.split('T')[0]);
        due.setHours(0, 0, 0, 0);

        const diffTime = due - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays < 0) return '<span class="text-[10px] font-bold bg-gray-500 text-white px-1.5 py-0.5 rounded">마감</span>';
        if (diffDays === 0) return '<span class="text-[10px] font-bold bg-red-500 text-white px-1.5 py-0.5 rounded animate-pulse">D-DAY</span>';
        if (diffDays === 1) return '<span class="text-[10px] font-bold bg-orange-500 text-white px-1.5 py-0.5 rounded">D-1</span>';
        if (diffDays <= 7) return `<span class="text-[10px] font-bold bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded">D-${diffDays}</span>`;
        return `<span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded">D-${diffDays}</span>`;
    }

    async function fetchUserInfo() {
        try {
            const user = await authAjax({ url: '/api/user', method: 'GET' });
            $('#user-name').text(user.name + '님');
        } catch(e) {}
    }

    // 핵심 변경 부분 1: 초기 데이터 로드 시 deleted: false 전달
    async function loadInitialData() {
        try {
            state.semesters = await authAjax({ url: '/semester/list', method: 'GET', data: { deleted: false } });
            state.subjects = await authAjax({ url: '/subject/list', method: 'GET', data: { deleted: false } });

            if (state.semesters.length > 0) {
                const savedSemesterId = Number(localStorage.getItem('currentSemesterId'));
                if (savedSemesterId && state.semesters.find(s => s.id === savedSemesterId)) {
                    state.currentSemesterId = savedSemesterId;
                } else {
                    state.currentSemesterId = state.semesters[0].id;
                }
            } else {
                state.currentSemesterId = null;
            }
            await fetchFilteredAssignments();
        } catch(e) {}
    }

    // 핵심 변경 부분 2: 과제 데이터 로드 시 deleted: false 전달
    async function fetchFilteredAssignments() {
        if (!state.currentSemesterId) {
            render();
            return;
        }
        const selectedSubjectName = $('#filter-subject').val();
        const selectedCategories = $('.filter-category:checked').map(function() { return this.value; }).get();

        // 기본적으로 deleted: false 상태의 데이터만 요청하도록 세팅
        let reqData = { deleted: false };
        if (selectedSubjectName) reqData.subjectName = selectedSubjectName;
        if (selectedCategories.length > 0) reqData.categories = selectedCategories.join(',');

        try {
            state.assignments = await authAjax({ url: '/assignment/list', method: 'GET', data: reqData });
            render();
        } catch(e) {}
    }

    function render() {
        renderSidebar();

        if (!state.currentSemesterId) {
            $('#header-semester-title').addClass('hidden');
            $('#subject-section, #assignment-section').addClass('hidden');
            $('#empty-semester-state').removeClass('hidden').addClass('flex');
            if(window.calendar) window.calendar.removeAllEvents();
            return;
        }

        $('#empty-semester-state').removeClass('flex').addClass('hidden');
        $('#header-semester-title').removeClass('hidden');
        $('#subject-section, #assignment-section').removeClass('hidden');

        const currentSem = state.semesters.find(s => s.id === state.currentSemesterId);
        $('#header-semester-title').text(currentSem.semesterName);

        const filteredSubjects = state.subjects.filter(s => s.semesterId === state.currentSemesterId);
        renderSubjects(filteredSubjects);
        updateSubjectFilterSelect(filteredSubjects);

        const semesterAssignments = state.assignments.filter(a => filteredSubjects.some(sub => sub.id === a.subjectId));
        semesterAssignments.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
        renderAssignments(semesterAssignments, filteredSubjects);
        renderCalendar(semesterAssignments, filteredSubjects);

        // 데이터가 렌더링될 때 PiP 창도 함께 최신화
        renderPiP();
    }

    function renderSidebar() {
        const listHtml = state.semesters.map(s => `
            <li class="flex justify-between items-center p-2.5 rounded-lg cursor-pointer font-medium transition text-sm
                ${s.id === state.currentSemesterId ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}"
                onclick="changeSemester(${s.id})">
                <span class="flex-1 truncate">${s.semesterName}</span>
                <div class="flex space-x-1.5 shrink-0 ml-2">
                    <button onclick="openSemesterModal(${s.id}, '${s.semesterName}'); event.stopPropagation();" class="text-gray-400 hover:text-blue-500">✎</button>
                    <button onclick="deleteSemester(${s.id}, event); event.stopPropagation();" class="text-gray-400 hover:text-red-500">🗑</button>
                </div>
            </li>
        `).join('');
        $('#semester-list').html(listHtml);
    }

    function renderSubjects(subjects) {
        const container = $('#subject-container');
        if(subjects.length === 0) {
            container.html('<p class="text-xs text-gray-500 p-1">생성된 과목이 없습니다.</p>');
            return;
        }
        const html = subjects.map(s => `
            <div class="min-w-[140px] bg-white border border-gray-200 p-2.5 rounded-lg shadow-sm flex justify-between items-center group hover:border-blue-300 transition">
                <span class="font-medium text-gray-800 text-sm truncate">${s.subjectName}</span>
                <div class="hidden group-hover:flex space-x-2 ml-2">
                    <button onclick="openSubjectModal(${s.id}, '${s.subjectName}')" class="text-gray-400 hover:text-blue-500 text-sm">✎</button>
                    <button onclick="deleteSubject(${s.id})" class="text-gray-400 hover:text-red-500 text-sm">✖</button>
                </div>
            </div>
        `).join('');
        container.html(html);
    }

    function updateSubjectFilterSelect(subjects) {
        const select = $('#filter-subject');
        const currentVal = select.val();
        let html = `<option value="">전체 과목</option>`;
        subjects.forEach(s => html += `<option value="${s.subjectName}">${s.subjectName}</option>`);
        select.html(html);
        if(subjects.some(s => s.subjectName === currentVal)) select.val(currentVal);
    }

    function renderAssignments(assignments, subjects) {
        let completedHtml = '';
        let incompleteHtml = '';
        if(assignments.length === 0){
            $('#incomplete-assignments').html('<p class="text-sm text-gray-500 text-center py-8">과제가 없습니다.</p>');
            $('#completed-assignments').html('<p class="text-sm text-gray-500 text-center py-8">완료된 과제가 없습니다.</p>');
            return;
        }
        assignments.forEach(a => {
            const subject = subjects.find(s => s.id === a.subjectId) || { subjectName: 'Unknown' };
            const isCompleted = a.isComplete;
            let catKor = a.category === 'ASSIGNMENT' ? '과제' : (a.category === 'LECTURE' ? '강의' : '할 일');
            const displayDate = a.dueDate ? a.dueDate.split('T')[0] : '';
            const ddayTag = getDdayTag(a.dueDate, isCompleted);

            const itemHtml = `
                <div class="${isCompleted ? 'bg-gray-50 opacity-70' : 'bg-white shadow-sm'} border p-3.5 rounded-lg flex justify-between items-center hover:shadow-md transition">
                    <div class="flex items-center space-x-3 flex-1 truncate">
                        <button onclick='toggleAssignmentStatus(${a.id}, ${!isCompleted})' class="shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300'} text-xs">
                            ${isCompleted ? '✓' : ''}
                        </button>
                        <div class="truncate">
                            <div class="flex items-center space-x-2 mb-0.5">
                                <span class="text-[10px] font-bold ${isCompleted ? 'bg-gray-200' : 'text-blue-600 bg-blue-100'} px-1.5 py-0.5 rounded">${catKor}</span>
                                ${ddayTag}
                                <span class="text-[11px] text-gray-500">~ ${displayDate}</span>
                            </div>
                            <h3 class="font-semibold text-sm truncate ${isCompleted ? 'line-through text-gray-400' : 'text-gray-800'}">${a.assignmentName}</h3>
                            <p class="text-[11px] text-gray-500">${subject.subjectName}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2.5 ml-2">
                        <button onclick='openAssignmentModal(${JSON.stringify(a)})' class="text-gray-400 hover:text-blue-600">✎</button>
                        <button onclick="deleteAssignment(${a.id})" class="text-gray-400 hover:text-red-500">🗑</button>
                    </div>
                </div>
            `;
            if (isCompleted) completedHtml += itemHtml;
            else incompleteHtml += itemHtml;
        });
        $('#completed-assignments').html(completedHtml || '<p class="text-center py-4 text-sm text-gray-400">없음</p>');
        $('#incomplete-assignments').html(incompleteHtml || '<p class="text-center py-4 text-sm text-gray-400">없음</p>');
    }

    /* --- 핵심 제어 로직 --- */
    function toggleSidebar() {
        $('#sidebar').toggleClass('-translate-x-full');
        $('#sidebar-overlay').toggleClass('hidden');
    }

    async function changeSemester(id) {
        state.currentSemesterId = id;
        localStorage.setItem('currentSemesterId', id);

        if (!$('#sidebar').hasClass('-translate-x-full')) {
            toggleSidebar();
        }

        $('#filter-subject').val('');
        $('.filter-category').prop('checked', false);
        await fetchFilteredAssignments();
    }

    function openSemesterModal(id = null, oldName = '') {
        if(id) {
            $('#semester-modal-title').text('학기 수정');
            $('#semester-modal-id').val(id);
            $('#semester-modal-name').val(oldName);
        } else {
            $('#semester-modal-title').text('새 학기 생성');
            $('#semester-modal-id').val('');
            $('#semester-modal-name').val('');
        }
        $('#semester-modal').removeClass('hidden').addClass('modal-show');
        setTimeout(() => $('#semester-modal-name').focus(), 100);
    }

    function closeSemesterModal() { $('#semester-modal').addClass('hidden').removeClass('modal-show'); }

    async function saveSemester() {
        const id = $('#semester-modal-id').val();
        const name = $('#semester-modal-name').val().trim();
        if(!name) return alert("학기명을 입력해주세요.");
        try {
            if(id) await authAjax({ url: '/semester', type: 'PUT', contentType: 'application/json', data: JSON.stringify({ id: Number(id), semesterName: name }) });
            else await authAjax({ url: '/semester', type: 'POST', contentType: 'application/json', data: JSON.stringify({ semesterName: name }) });
            closeSemesterModal();
            loadInitialData();
        } catch(e) {}
    }

    async function deleteSemester(id, event) {
        if(!confirm("정말로 삭제하시겠습니까?")) return;
        await authAjax({ url: '/semester', type: 'DELETE', contentType: 'application/json', data: JSON.stringify({ id: id }) });
        loadInitialData();
    }

    function openSubjectModal(id = null, oldName = '') {
        if(id) { $('#subject-modal-title').text('과목 수정'); $('#subject-modal-id').val(id); $('#subject-modal-name').val(oldName); }
        else { $('#subject-modal-title').text('새 과목 추가'); $('#subject-modal-id').val(''); $('#subject-modal-name').val(''); }
        $('#subject-modal').removeClass('hidden').addClass('modal-show');
        setTimeout(() => $('#subject-modal-name').focus(), 100);
    }

    function closeSubjectModal() { $('#subject-modal').addClass('hidden').removeClass('modal-show'); }

    async function saveSubject() {
        const id = $('#subject-modal-id').val();
        const name = $('#subject-modal-name').val().trim();
        if(!name) return alert("과목명을 입력해주세요.");
        try {
            if(id) await authAjax({ url: '/subject', type: 'PUT', contentType: 'application/json', data: JSON.stringify({ id: Number(id), subjectName: name }) });
            else await authAjax({ url: '/subject', type: 'POST', contentType: 'application/json', data: JSON.stringify({ subjectName: name, semesterId: state.currentSemesterId }) });
            closeSubjectModal();
            loadInitialData();
        } catch(e) {}
    }

    async function deleteSubject(id) {
        if(!confirm("삭제하시겠습니까?")) return;
        await authAjax({ url: '/subject', type: 'DELETE', contentType: 'application/json', data: JSON.stringify({ id: id }) });
        loadInitialData();
    }

    function openAssignmentModal(assignment = null) {
        const subjects = state.subjects.filter(s => s.semesterId === state.currentSemesterId);
        if(subjects.length === 0) return alert("먼저 과목을 추가해주세요.");
        $('#modal-subject').html(subjects.map(s => `<option value="${s.id}">${s.subjectName}</option>`).join(''));
        if(assignment) {
            $('#modal-title').text('과제 수정');
            $('#modal-id').val(assignment.id);
            $('#modal-name').val(assignment.assignmentName);
            $('#modal-date').val(assignment.dueDate ? assignment.dueDate.split('T')[0] : '');
            $('#modal-category').val(assignment.category);
            $('#modal-subject').val(assignment.subjectId);
            $('#modal-complete').prop('checked', assignment.isComplete);
            $('#modal-complete-wrapper').removeClass('hidden');
        } else {
            $('#modal-title').text('과제 추가');
            $('#modal-id').val(''); $('#modal-name').val(''); $('#modal-date').val('');
            $('#modal-category').val('ASSIGNMENT'); $('#modal-complete-wrapper').addClass('hidden');
        }
        $('#assignment-modal').removeClass('hidden').addClass('modal-show');
        setTimeout(() => $('#modal-name').focus(), 100);
    }

    function closeAssignmentModal() { $('#assignment-modal').addClass('hidden').removeClass('modal-show'); }

    async function saveAssignment() {
        const name = $('#modal-name').val();
        const date = $('#modal-date').val();
        if(!name || !date) return alert("필수값을 입력해주세요.");
        const payload = { assignmentName: name, dueDate: date, category: $('#modal-category').val(), subjectId: Number($('#modal-subject').val()) };
        const id = $('#modal-id').val();
        try {
            if(id) { payload.id = Number(id); payload.isComplete = $('#modal-complete').is(':checked'); await authAjax({ url: '/assignment', type: 'PUT', contentType: 'application/json', data: JSON.stringify(payload) }); }
            else await authAjax({ url: '/assignment', type: 'POST', contentType: 'application/json', data: JSON.stringify(payload) });
            closeAssignmentModal();
            fetchFilteredAssignments();
        } catch(e) {}
    }

    async function deleteAssignment(id) {
        if(!confirm("삭제하시겠습니까?")) return;
        await authAjax({ url: '/assignment', type: 'DELETE', contentType: 'application/json', data: JSON.stringify({ id: id }) });
        fetchFilteredAssignments();
    }

    async function toggleAssignmentStatus(id, newStatus) {
        const target = state.assignments.find(a => a.id === id);
        if(!target) return;
        const payload = { id: target.id, assignmentName: target.assignmentName, dueDate: target.dueDate ? target.dueDate.split('T')[0] : null, category: target.category, subjectId: target.subjectId, isComplete: newStatus };
        try { await authAjax({ url: '/assignment', type: 'PUT', contentType: 'application/json', data: JSON.stringify(payload) }); fetchFilteredAssignments(); } catch(e) {}
    }

    function toggleCalendar() {
        const modal = $('#calendar-modal');
        if(modal.hasClass('hidden')) { modal.removeClass('hidden').addClass('modal-show'); setTimeout(() => { window.calendar.updateSize(); window.calendar.render(); }, 10); }
        else modal.addClass('hidden').removeClass('modal-show');
    }

    function logout() { localStorage.removeItem("accessToken"); localStorage.removeItem("refreshToken"); location.replace('/user/login'); }

    function initCalendar() {
        const calendarEl = document.getElementById('calendar');
        window.calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,dayGridWeek' },
            height: '100%',
            displayEventTime: false,
            eventDidMount: function(info) {
                const p = info.event.extendedProps;
                info.el.title = `[${p.cat}] ${info.event.title}\n과목: ${p.subject}`;
            }
        });
    }

    function renderCalendar(assignments, subjects) {
        if(!window.calendar) return;
        window.calendar.removeAllEvents();
        const events = assignments.map(a => {
            const sub = subjects.find(s => s.id === a.subjectId) || { subjectName: '' };
            let catKor = a.category === 'ASSIGNMENT' ? '과제' : (a.category === 'LECTURE' ? '강의' : '할 일');
            let color = a.isComplete ? '#cbd5e1' : (a.category === 'ASSIGNMENT' ? '#ef4444' : '#10b981');
            return { title: a.assignmentName, start: a.dueDate ? a.dueDate.split('T')[0] : '', backgroundColor: color, borderColor: color, allDay: true, extendedProps: { subject: sub.subjectName, cat: catKor } };
        });
        window.calendar.addEventSource(events);
    }

    /* --- Document PiP (미니 창) 로직 --- */
    let pipWindow = null;

    async function openPiP() {
        if (!('documentPictureInPicture' in window)) {
            alert('현재 브라우저에서는 미니 창 기능을 지원하지 않습니다. (크롬 기반 브라우저 최신 버전 권장)');
            return;
        }

        try {
            // 이미 열려있다면 포커스만 맞춤
            if (pipWindow) {
                pipWindow.focus();
                return;
            }

            // PiP 창 열기 (사이즈 지정)
            pipWindow = await documentPictureInPicture.requestWindow({
                width: 320,
                height: 500,
            });

            pipWindow.addEventListener('pagehide', () => {
                pipWindow = null;
            });

            // Tailwind CSS 스크립트 주입
            const tailwindScript = pipWindow.document.createElement('script');
            tailwindScript.src = "https://cdn.tailwindcss.com";
            pipWindow.document.head.appendChild(tailwindScript);

            // 기존 스타일 복사 주입
            [...document.styleSheets].forEach((styleSheet) => {
                try {
                    const cssRules = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
                    const style = document.createElement('style');
                    style.textContent = cssRules;
                    pipWindow.document.head.appendChild(style);
                } catch (e) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.type = styleSheet.type;
                    link.media = styleSheet.media;
                    link.href = styleSheet.href;
                    pipWindow.document.head.appendChild(link);
                }
            });

            // 내부 UI 뼈대 생성
            pipWindow.document.body.className = "bg-gray-50 flex flex-col h-screen overflow-hidden font-sans";
            pipWindow.document.body.innerHTML = `
                <div class="bg-gray-800 text-white p-3 flex justify-between items-center shrink-0 shadow-md z-10">
                    <h3 class="font-bold text-sm">⚡ 미완료 과제</h3>
                    <select id="pip-semester-select" class="text-xs bg-gray-700 border border-gray-600 text-white rounded px-2 py-1 outline-none cursor-pointer focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div id="pip-list" class="flex-1 overflow-y-auto p-3 space-y-3"></div>
            `;

            // 학기 변경 이벤트 연결
            pipWindow.document.getElementById('pip-semester-select').addEventListener('change', async (e) => {
                const newSemId = Number(e.target.value);
                if(newSemId) {
                    await changeSemester(newSemId);
                }
            });

            // Tailwind 적용 시간 확보 후 렌더링
            setTimeout(() => renderPiP(), 100);

        } catch (error) {
            console.error(error);
            alert('미니 창을 여는 데 실패했습니다.');
        }
    }

    function renderPiP() {
        if (!pipWindow) return;

        const selectEl = pipWindow.document.getElementById('pip-semester-select');
        if(selectEl) {
            selectEl.innerHTML = state.semesters.map(s =>
                `<option value="${s.id}" ${s.id === state.currentSemesterId ? 'selected' : ''}>${s.semesterName}</option>`
            ).join('');
        }

        const listEl = pipWindow.document.getElementById('pip-list');
        if(!listEl) return;

        const filteredSubjects = state.subjects.filter(s => s.semesterId === state.currentSemesterId);
        const semesterAssignments = state.assignments.filter(a => filteredSubjects.some(sub => sub.id === a.subjectId));
        const incompleteList = semesterAssignments.filter(a => !a.isComplete);

        if (incompleteList.length === 0) {
            listEl.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full opacity-50 mt-10">
                    <span class="text-4xl mb-3">🎉</span>
                    <p class="text-sm font-bold text-gray-700">모든 과제 완료!</p>
                </div>`;
            return;
        }

        listEl.innerHTML = incompleteList.map(a => {
            const subject = filteredSubjects.find(s => s.id === a.subjectId) || { subjectName: 'Unknown' };
            const displayDate = a.dueDate ? a.dueDate.split('T')[0] : '';
            const ddayTag = getDdayTag(a.dueDate, a.isComplete);

            return `
                <div class="bg-white border border-gray-200 p-3.5 rounded-xl shadow-sm flex flex-col transition">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-sm font-bold text-gray-800 pr-2 leading-tight">${a.assignmentName}</span>
                        <div class="shrink-0">${ddayTag}</div>
                    </div>
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-0.5 rounded truncate max-w-[60%]">${subject.subjectName}</span>
                        <span class="text-[11px] text-gray-400 font-medium">~ ${displayDate}</span>
                    </div>
                    <button class="pip-complete-btn w-full bg-gray-50 border border-gray-200 text-gray-600 hover:bg-green-50 hover:text-green-600 hover:border-green-300 py-2 rounded-lg text-xs font-bold transition flex items-center justify-center gap-1" data-id="${a.id}">
                        ✓ 완료 처리하기
                    </button>
                </div>
            `;
        }).join('');

        const btns = pipWindow.document.querySelectorAll('.pip-complete-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = Number(e.currentTarget.getAttribute('data-id'));
                await toggleAssignmentStatus(id, true);
            });
        });
    }
</script>
</body>
</html>

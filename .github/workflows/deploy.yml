name: Spring Boot CI/CD to EC2

# 1. 동작 조건: main 브랜치에 push가 발생했을 때 실행됩니다.
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest # 깃허브의 가상 서버 환경

    steps:
      # 2. SSH 접속을 통해 EC2 내부의 deploy.sh 스크립트를 실행합니다.
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/subkeeper
            ./deploy.sh
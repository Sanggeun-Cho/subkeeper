<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2359</title>
    <link rel="icon" href="/images/icon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-2xl shadow-xl w-96 flex flex-col items-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 mb-4 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </svg>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Subkeeper</h1>
    <p class="text-sm text-gray-500 mb-8 text-center">스마트 과제 관리 시스템</p>

    <div id="g_id_onload"
         data-client_id="819117992716-vte3g2rcp56uo6l8tfr3nk3ve6o9kc7h.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
</div>

<script>
    function handleCredentialResponse(response) {
        const idToken = response.credential;
        listener_google_login(idToken);
    }

    function listener_google_login(idToken){
        $.ajax({
            url: "/api/user/google",
            method: "POST",
            contentType : 'application/json; charset=utf-8',
            data: idToken,
            success: (data, status, xhr)=>{
                let refreshToken = xhr.getResponseHeader("RefreshToken");
                if(!refreshToken || Number(refreshToken) <= 0){
                    alert("로그인에 실패했습니다.");
                } else {
                    localStorage.setItem("refreshToken", refreshToken);
                    getAccessToken();
                }
            },
            error: (data, status, xhr)=>{
                alert("서버와 통신 중 오류가 발생했습니다.");
            },
        });
    }

    function getAccessToken(){
        $.ajax({
            url: "/api/auth",
            method: "POST",
            beforeSend : function(xhr){
                let refreshToken = localStorage.getItem("refreshToken");
                xhr.setRequestHeader("RefreshToken", refreshToken);
            },
            contentType : 'application/json; charset=utf-8',
            success: (data, status, xhr)=>{
                let accessToken = xhr.getResponseHeader("Authorization");
                localStorage.setItem("accessToken", accessToken);
                // 로그인 성공 시 요청하신 경로로 이동
                location.replace('/assignment/dashboard');
            },
            error: (data, status, xhr)=>{
                alert("인증 토큰을 가져오는데 실패했습니다.");
            },
        });
    }
</script>
</body>
</html>
